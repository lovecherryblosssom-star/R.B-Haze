<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">

        <header class="header-section">
            
            <div class="header-top-parent">
                <div class="logo-child-box">
                    <img src="logo.png" alt="Rose Berry Haze Logo">
                </div>
                
                <div class="contact-parent-row">
                    <div class="contact-child-item">
                        <span>Call: +92 300 1234567</span>
                    </div>
                    <div class="contact-child-item">
                        <span>Email: info@roseberryhaze.com</span>
                    </div>
                </div>
            </div>

            <nav class="nav-parent-row">
                <div class="links-child-group">
                    <a href="#">Home</a>
                    <a href="#">About</a>
                    <a href="#">Menu</a>
                    <a href="#">Contact</a>
                </div>
                <div class="action-child-group">
                    <button class="cta-button">ORDER NOW</button>
                </div>
            </nav>
        </header>

        <section class="hero-banner-parent">
            <div class="hero-text-child">
                <h1>Crafting Sweet Memories</h1>
                <p>Welcome to the finest dessert experience.</p>
                <button class="hero-cta">EXPLORE</button>
            </div>
        </section>

    </div>
</body>
</html>
